name: Tests
on: [push, pull_request]

permissions:
  contents: write

env:
  UV_CACHE_DIR: /tmp/uv-cache

jobs:

  # MARK: Tests job

  tests-job:
    runs-on: alpine-uv

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      #----------------------------------------------
      #---- Checkout and set up Python
      #----------------------------------------------

      - name: Install git
        run: apk add --no-cache git nodejs

      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git -c http.extraheader="Authorization: token ${GITHUB_TOKEN}" clone --depth 1 --branch ${GITHUB_REF#refs/heads/} ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git .
          git checkout $GITHUB_SHA

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      #----------------------------------------------
      #---- Install dependencies
      #----------------------------------------------

      - name: uv install
        run: uv sync --all-extras --dev --python ${{ matrix.python-version }}

      #----------------------------------------------
      #---- Show installation details
      #----------------------------------------------

      - name: uv --version
        run: uv --version
      - name: uv run python --version
        run: uv run python --version
      - name: ls -lah
        run: ls -lah
      - name: uv tree
        run: uv tree

      #----------------------------------------------
      #---- Linting and Static Analysis
      #----------------------------------------------

      - name: 🔎 Ruff checks
        run: uv run ruff check .

      - name: 🔎 Ruff format checks
        run: uv run ruff format --check .

      - name: 🐍 Static Type Checker
        run: uv run pyrefly check . --no-progress-bar

      #----------------------------------------------
      #---- Run tests with coverage report
      #----------------------------------------------

      - name: 🚀 Run tests with code coverage report
        run: uv run pytest --cov=statica --cov-report term-missing

      #----------------------------------------------
      #---- Save coverage artifact
      #----------------------------------------------

      - name: Show artifacts (ls -lah)
        if: matrix.python-version == '3.12'
        run: ls -lah
      - uses: actions/upload-artifact@v3
        if: matrix.python-version == '3.12'
        with:
          name: coverage-3.12
          include-hidden-files: true
          if-no-files-found: error
          path: ".coverage"

  # MARK: Badge Job

  cov-badge-job:
    needs: tests-job
    runs-on: alpine-uv
    steps:
      - name: Install git
        run: apk add --no-cache git nodejs

      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git -c http.extraheader="Authorization: token ${GITHUB_TOKEN}" clone --depth 1 --branch ${GITHUB_REF#refs/heads/} ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git .
          git checkout $GITHUB_SHA

      #----------------------------------------------
      #---- Download and debug artifact
      #----------------------------------------------

      - uses: actions/download-artifact@v3
        with:
          name: coverage-3.12
          path: .

      #----------------------------------------------
      #---- Generate coverage badge
      #----------------------------------------------

      - name: Generate Coverage Badge
        run: |
          ls -la .coverage* || echo "No .coverage file found"
          uv run --with coverage --with genbadge[coverage] -- coverage xml
          uv run --with coverage --with genbadge[coverage] -- genbadge coverage -i coverage.xml -o assets/coverage.svg
          head -5 assets/coverage.svg

      #----------------------------------------------
      #---- Commit and push if changed
      #----------------------------------------------

      - name: Check if coverage badge changed
        id: badge-diff
        run: |
          git add assets/coverage.svg
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push coverage badge
        if: steps.badge-diff.outputs.changed == 'true'
        run: |
          git config user.name "actions[bot]"
          git config user.email "actions[bot]@users.noreply.com"
          git commit -m "Updated assets/coverage.svg"
          git -c http.extraheader="Authorization: token ${GITHUB_TOKEN}" push origin HEAD:${GITHUB_REF}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
